<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar senha - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container small">
    <section class="auth-panel">
        <div class="brand">
            <div class="brand-mark">B</div>
            <div>
                <h1>Recuperar senha</h1>
                <p>Informe seu e-mail para receber o link de redefinicao.</p>
            </div>
        </div>

        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <label>
                E-mail
                <input type="email" name="email" autocomplete="email" required>
            </label>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Enviar link</button>
        </form>

        <p class="auth-link"><a th:href="@{/login}">Voltar para o login</a></p>
    </section>
</main>
</body>
</html>
