<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova senha - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container small">
    <section class="auth-panel">
        <div class="brand">
            <div class="brand-mark">B</div>
            <div>
                <h1>Nova senha</h1>
                <p>Crie uma senha com pelo menos 6 caracteres.</p>
            </div>
        </div>

        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <label>
                Nova senha
                <input type="password" name="password" minlength="6" autocomplete="new-password" required>
            </label>

            <label>
                Confirmar senha
                <input type="password" name="confirmPassword" minlength="6" autocomplete="new-password" required>
            </label>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Alterar senha</button>
        </form>

        <p class="auth-link"><a th:href="@{/login}">Voltar para o login</a></p>
    </section>
</main>
</body>
</html>
