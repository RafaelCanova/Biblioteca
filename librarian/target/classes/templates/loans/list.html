<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimos - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">B</div>
            <div>
                <h1>Empréstimos</h1>
                <p>Acompanhe saídas, prazos e devoluções.</p>
            </div>
        </div>
        <div class="top-actions">
            <a class="button-link secondary" th:href="@{/dashboard}">&larr; Dashboard</a>
            <a class="button-link" th:href="@{/loans/new}">Novo empréstimo</a>
        </div>
    </header>

    <nav class="nav-links" aria-label="Navegação principal">
        <a class="secondary" th:href="@{/users}">Usuários</a>
        <a class="secondary" th:href="@{/books}">Livros</a>
        <a class="secondary" th:href="@{/reservations}">Reservas</a>
    </nav>

    <section class="panel">
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(loans)}">
            <table>
                <thead>
                <tr><th>Livro</th><th>Usuário</th><th>Empréstimo</th><th>Devolução prevista</th><th>Status</th><th>Ação</th></tr>
                </thead>
                <tbody>
                <tr th:each="loan : ${loans}">
                    <td th:text="${loan.bookTitle}"></td>
                    <td th:text="${loan.userName}"></td>
                    <td th:text="${loan.loanDate}"></td>
                    <td th:text="${loan.dueDate}"></td>
                    <td>
                        <span th:class="${loan.returned ? 'badge success' : 'badge warning'}"
                              th:text="${loan.returned ? 'Devolvido' : 'Aberto'}"></span>
                    </td>
                    <td>
                        <form th:if="${!loan.returned}" th:action="@{'/loans/return/' + ${loan.id}}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit">Registrar devolução</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <p class="empty" th:if="${#lists.isEmpty(loans)}">Nenhum empréstimo registrado ainda.</p>
    </section>
</main>
</body>
</html>
