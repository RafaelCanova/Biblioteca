<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Empréstimo - Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">B</div>
            <div>
                <h1>Novo empréstimo</h1>
                <p>Selecione um livro disponível e o usuário responsável.</p>
            </div>
        </div>
        <a class="button-link secondary" th:href="@{/loans}">&larr; Empréstimos</a>
    </header>

    <section class="panel">
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/loans}" method="post" class="form-grid">
            <label>
                Livro
                <select name="bookId" required>
                    <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title + ' (' + book.availableQuantity + ' disponíveis)'}"></option>
                </select>
            </label>

            <label>
                Usuário
                <select name="userId" required>
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
                </select>
            </label>

            <label>
                Prazo em dias
                <input type="number" name="days" value="7" min="1" required>
            </label>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-actions full">
                <button type="submit">Salvar empréstimo</button>
                <a class="button-link secondary" th:href="@{/loans}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
