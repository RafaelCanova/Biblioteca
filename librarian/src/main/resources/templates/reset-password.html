<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Definir Nova Senha</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container small">
    <section class="auth-panel">
        <header class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Definir nova senha</h1>
                <p>Crie uma senha forte com pelo menos 6 caracteres para sua segurança.</p>
            </div>
        </header>

        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-grid">
                <label class="full">
                    Nova Senha
                    <input type="password" name="password" minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
                </label>

                <label class="full">
                    Confirmar Nova Senha
                    <input type="password" name="confirmPassword" minlength="6" placeholder="Repita a nova senha" autocomplete="new-password" required>
                </label>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <button type="submit" class="button-primary">Atualizar Senha</button>
        </form>

        <footer class="auth-link">
            <p><a th:href="@{/login}">Cancelar e voltar ao login</a></p>
        </footer>
    </section>
</main>
</body>
</html>
