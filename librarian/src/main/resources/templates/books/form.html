<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Detalhes do Livro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1 th:text="${book.id == null ? 'Novo Livro' : 'Editar Livro'}"></h1>
                <p>Gestão de Acervo e Inventário (EAP 3.2).</p>
            </div>
        </div>
        <a class="button-link secondary" th:href="@{/books}">&larr; Voltar ao Catálogo</a>
    </header>

    <section class="panel">
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/books}" th:object="${book}" method="post" class="form-grid">
            <input type="hidden" th:field="*{id}">
            
            <label class="full">
                Título da Obra
                <input type="text" th:field="*{title}" placeholder="Ex: Engenharia de Software Moderna" required>
            </label>
            
            <label>
                Autor principal
                <input type="text" th:field="*{author}" required>
            </label>
            
            <label>
                ISBN
                <input type="text" th:field="*{isbn}" placeholder="000-00-000-0000-0" required>
            </label>
            
            <label>
                Editora
                <input type="text" th:field="*{publisher}" required>
            </label>

            <label>
                Quantidade em Estoque
                <input type="number" min="1" th:field="*{totalQuantity}" required>
            </label>

            <label class="full">
                Resumo / Sinopse
                <textarea th:field="*{summary}" placeholder="Breve descrição da obra para o sistema de pesquisa (EAP 3.3)..."></textarea>
            </label>
            
            <input type="hidden" th:field="*{availableQuantity}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="form-actions full">
                <button type="submit" class="button-primary">Salvar no Acervo</button>
                <a class="button-link secondary" th:href="@{/books}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
