<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Catálogo de Livros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Catálogo de Livros</h1>
                <p>Gestão de estoque e consulta de disponibilidade (EAP 3.4).</p>
            </div>
        </div>
        <div class="top-actions">
            <a class="button-link secondary" th:href="@{/dashboard}">&larr; Dashboard</a>
            <a class="button-link" th:href="@{/books/new}">+ Adicionar Livro</a>
        </div>
    </header>

    <nav class="nav-links" aria-label="Navegação secundária">
        <a class="button-link secondary" th:href="@{/users}">Usuários</a>
        <a class="button-link secondary" th:href="@{/loans}">Empréstimos</a>
        <a class="button-link secondary" th:href="@{/reservations}">Reservas</a>
    </nav>

    <section class="panel">
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(books)}">
            <table>
                <thead>
                    <tr>
                        <th>Título / Autor</th>
                        <th>ISBN</th>
                        <th>Estoque Total</th>
                        <th>Disponíveis</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="book : ${books}">
                        <td>
                            <strong th:text="${book.title}"></strong><br>
                            <small th:text="${book.author}" style="color: var(--muted)"></small>
                        </td>
                        <td th:text="${book.isbn}"></td>
                        <td th:text="${book.totalQuantity}"></td>
                        <td>
                            <span th:class="${book.availableQuantity > 0} ? 'badge success' : 'badge warning'" 
                                  th:text="${book.availableQuantity}"></span>
                        </td>
                        <td>
                            <div class="row-actions">
                                <a th:href="@{'/books/edit/' + ${book.id}}" class="button-link secondary" style="min-height: 32px; padding: 5px 10px;">Editar</a>
                                <form th:action="@{'/books/delete/' + ${book.id}}" method="post" onsubmit="return confirm('Deseja realmente excluir este livro do acervo?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="button-danger" type="submit" style="min-height: 32px; padding: 5px 10px;">Excluir</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="empty" th:if="${#lists.isEmpty(books)}">
            <p>O acervo está vazio. Comece cadastrando um novo exemplar.</p>
        </div>
    </section>
</main>
</body>
</html>
