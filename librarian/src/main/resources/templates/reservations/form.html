<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Criar Reserva</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Nova Reserva</h1>
                <p>Gestão de fila de espera para obras concorridas (EAP 3.5).</p>
            </div>
        </div>
        <a class="button-link secondary" th:href="@{/reservations}">&larr; Voltar à Fila</a>
    </header>

    <section class="panel">
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/reservations}" method="post" class="form-grid">
            <label class="full">
                Obra para Reserva
                <select name="bookId" required>
                    <option th:each="book : ${books}" th:value="${book.id}" 
                            th:text="${book.title + ' (' + book.availableQuantity + ' em estoque)'}"></option>
                </select>
            </label>

            <label class="full">
                Leitor Interessado
                <select name="userId" required>
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
                </select>
            </label>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="form-actions full">
                <button type="submit" class="button-primary">Confirmar Reserva</button>
                <a class="button-link secondary" th:href="@{/reservations}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
