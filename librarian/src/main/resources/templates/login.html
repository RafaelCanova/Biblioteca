<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Acesso ao Sistema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container small">
    <section class="auth-panel">
        <header class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Librarian</h1>
                <p>Gestão de acervo, empréstimos e reservas.</p>
            </div>
        </header>

        <div th:if="${param.error}" class="alert error">E-mail ou senha inválidos. Por favor, tente novamente.</div>
        <div th:if="${param.logout}" class="alert success">Sua sessão foi encerrada com sucesso.</div>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-grid">
                <label class="full">
                    E-mail Institucional
                    <input type="email" name="username" placeholder="admin@biblioteca.com" autocomplete="username" required>
                </label>

                <label class="full">
                    Senha de Acesso
                    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                </label>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <button type="submit" class="button-primary">Entrar no Sistema</button>
        </form>

        <footer class="auth-link">
            <p><a th:href="@{/forgot-password}">Esqueci minha senha</a></p>
        </footer>
    </section>
</main>
</body>
</html>
