<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Recuperar Senha</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container small">
    <section class="auth-panel">
        <header class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Recuperar acesso</h1>
                <p>Enviaremos um link de redefinição para o seu e-mail cadastrado.</p>
            </div>
        </header>

        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-grid">
                <label class="full">
                    E-mail Institucional
                    <input type="email" name="email" placeholder="exemplo@biblioteca.com" autocomplete="email" required>
                </label>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <button type="submit" class="button-primary">Enviar link de recuperação</button>
        </form>

        <footer class="auth-link">
            <p>Lembrou a senha? <a th:href="@{/login}">Voltar para o login</a></p>
        </footer>
    </section>
</main>
</body>
</html>
