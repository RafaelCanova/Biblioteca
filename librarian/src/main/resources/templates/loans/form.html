<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian - Novo Empréstimo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="container">
    <header class="app-header">
        <div class="brand">
            <div class="brand-mark">L</div>
            <div>
                <h1>Novo Empréstimo</h1>
                <p>Circulação de acervo e controle de prazos (EAP 3.5).</p>
            </div>
        </div>
        <a class="button-link secondary" th:href="@{/loans}">&larr; Voltar para Lista</a>
    </header>

    <section class="panel">
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/loans}" method="post" class="form-grid">
            <label class="full">
                Livro para Empréstimo
                <select name="bookId" required>
                    <option th:each="book : ${books}" th:value="${book.id}" 
                            th:text="${book.title + ' (' + book.availableQuantity + ' unidades disponíveis)'}"></option>
                </select>
            </label>

            <label>
                Usuário / Leitor
                <select name="userId" required>
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"></option>
                </select>
            </label>

            <label>
                Prazo de Devolução (em dias)
                <input type="number" name="days" value="7" min="1" max="30" required>
            </label>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <div class="form-actions full">
                <button type="submit" class="button-primary">Confirmar Saída</button>
                <a class="button-link secondary" th:href="@{/loans}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
